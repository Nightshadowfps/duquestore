    color: #fff;

    border-radius: 28px;
    background: rgba(20, 0, 3, .72);

  .logo {

    font-size: 28px;
    line-height: 1;

  .subtitle { margin: 0 0 22px; opacity: .82; }
  .qr {
    background: #fff;
    border-radius: 20px;
    padding: 14px;

  }
  .qr img { width: 100%; display: block; }
  .label { font-size: 13px; opacity: .72; margin-bottom: 6px; }
  .key {
    margin: 0 0 18px;
    font-size: 19px;
    font-weight: 700;
    word-break: break-word;
  }
  button {
    width: 100%;
    border: 0;
    border-radius: 16px;
    padding: 16px 18px;
    background: #e6001a;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.08); }
  #status { min-height: 22px; margin: 12px 0 0; font-size: 14px; color: #b9ffbf; }
  .warning {
    margin-top: 16px;
    font-size: 12px;
    line-height: 1.45;
    opacity: .72;
  }

<script>
const pix = '00020101021126360014BR.GOV.BCB.PIX0114+55519806508155204000053039865802BR5911DUQUE STORE6012SAO LEOPOLDO62070503***63049852';
const button = document.getElementById("copyBtn");
const status = document.getElementById("status");

button.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(pix);
    status.textContent = "Código PIX copiado!";
    button.textContent = "PIX COPIADO ✓";
  } catch (error) {
    const area = document.createElement("textarea");
    area.value = pix;
    area.style.position = "fixed";
    area.style.opacity = "0";
    document.body.appendChild(area);
    area.select();
    document.execCommand("copy");
    area.remove();
    status.textContent = "Código PIX copiado!";
    button.textContent = "PIX COPIADO ✓";
  }
});
