<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#9d0011">
  <meta name="description" content="Cartão virtual da Duque Store">
  <title>Duque Store</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #120003;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      position: relative;
      width: min(100vw, 768px);
      overflow: hidden;
      background: #180003;
      box-shadow: 0 0 45px rgba(0,0,0,.55);
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      left: 12.3%;
      width: 75.4%;
      border-radius: 24px;
      text-decoration: none;
      cursor: pointer;
      outline: none;
    }

    .hotspot:hover {
      background: rgba(255,255,255,.05);
    }

    .hotspot:active {
      background: rgba(255,255,255,.12);
    }

    .hotspot:focus-visible {
      box-shadow: inset 0 0 0 4px rgba(255,255,255,.95);
    }

    /* Áreas clicáveis alinhadas com os quatro botões da arte */
    .instagram { top: 57.55%; height: 8.55%; }
    .whatsapp  { top: 66.65%; height: 8.55%; }
    .location  { top: 75.75%; height: 8.65%; }
    .pix       { top: 84.95%; height: 8.60%; }

    @media (min-width: 769px) {
      body {
        padding: 24px 0;
      }

      .card {
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Cartão virtual da Duque Store">
    <img src="cartao-duque-store.png" alt="Cartão virtual da Duque Store">

    <a
      class="hotspot instagram"
      href="https://www.instagram.com/duque_storesl/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Abrir Instagram da Duque Store">
    </a>

    <a
      class="hotspot whatsapp"
      href="https://wa.me/5551980650815"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Abrir WhatsApp da Duque Store">
    </a>

    <a
      class="hotspot location"
      href="https://www.google.com/maps/search/?api=1&query=Duque+Store%2C+Rua+Fernando+Ribeiro+de+Castro%2C+71%2C+Duque+de+Caxias%2C+S%C3%A3o+Leopoldo%2C+RS%2C+93037-300"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Abrir localização da Duque Store">
    </a>

    <a
      class="hotspot pix"
      href="pix_duque_store.html"
      aria-label="Abrir página PIX da Duque Store">
    </a>
  </main>
</body>
</html>
